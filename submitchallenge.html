<!doctype html>
<html lang="en">
<head>
  <!-- Spencer Cox -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChallengeHub | Submit</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="navbar">
    <div class="wrap">
      <div class="brand">
        <img src="images/challenge-hub.png" alt="ChallengeHub logo" class="logo">
        <span>ChallengeHub</span>
      </div>
      <nav class="navlinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="challenges.html">Challenges</a>
        <a href="guides.html">Guides</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="submitchallenge.html" class="active">Submit</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <section class="hero">
      <h1>Submit Your Challenge Run</h1>
      <p>
        Enter your challenge details below so your run can be reviewed and added to the leaderboard.
      </p>
    </section>

    <section class="form-card">
      <form>
        <div class="form-group">
          <label for="player-name">Player Name</label>
          <input type="text" id="player-name" name="player-name" placeholder="Enter your gamer tag">
        </div>

        <div class="form-group">
          <label for="challenge-name">Challenge</label>
          <select id="challenge-name" name="challenge-name">
            <option>No-Heal Run</option>
            <option>Grey Loot Only</option>
            <option>Movement Madness</option>
            <option>One-Spot Loot</option>
            <option>No Reload Challenge</option>
            <option>Sniper Only</option>
            <option>Storm Edge Play</option>
            <option>Minimal Inventory</option>
          </select>
        </div>

        <div class="form-group">
          <label for="result">Result</label>
          <input type="text" id="result" name="result" placeholder="Example: Top 5 + 4 Elims">
        </div>

        <div class="form-group">
          <label for="proof">Proof Link</label>
          <input type="url" id="proof" name="proof" placeholder="Paste screenshot or clip link">
        </div>

        <div class="form-group">
          <label for="notes">Extra Notes</label>
          <textarea id="notes" name="notes" placeholder="Anything else about your run?"></textarea>
        </div>

        <button type="submit" class="btn">Submit Run</button>
      </form>
    </section>

  </main>

  <footer>
    <p>&copy; 2026 ChallengeHub. All rights reserved.</p>
  </footer>

</body>
</html>
